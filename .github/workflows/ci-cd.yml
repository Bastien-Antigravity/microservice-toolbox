name: CI
on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOTOOLCHAIN: auto

jobs:
  go-ci:
    name: Go (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum
          
      - name: Build and Test
        run: |
          cd go
          go build ./...
          go test -v ./...
          
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go

  python-ci:
    name: Python (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/pyproject.toml
          
      - name: Install dependencies
        run: |
          cd python
          pip install .[test]
          
      - name: Run Linting (Ruff)
        run: |
          cd python
          ruff check .
          
      - name: Run Tests (Pytest)
        run: |
          cd python
          pytest

  rust-ci:
    name: Rust (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run Cargo Test
        run: |
          cd rust
          cargo test --verbose
          
      - name: Run Cargo Clippy
        run: |
          cd rust
          cargo clippy -- -D warnings

  integration-ci:
    name: Cross-Language Integration
    needs: [go-ci, python-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          cd python
          pip install .
      - name: Run Integration Tests
        run: |
          chmod +x integration/run_tests.sh
          ./integration/run_tests.sh
