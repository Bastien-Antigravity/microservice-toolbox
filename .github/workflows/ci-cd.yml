name: CI
on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOTOOLCHAIN: auto

jobs:
  go-ci:
    name: Go (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Distributed-Config
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config

      - name: Checkout Safe-Socket
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/safe-socket
          path: safe-socket

      - name: Checkout Toolbox
        uses: actions/checkout@v4
        with:
          path: microservice-toolbox

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: microservice-toolbox/go/go.sum
          
      - name: Build and Test
        run: |
          cd microservice-toolbox/go
          go build ./...
          go test -v ./...
          
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: |
          cd microservice-toolbox/go
          $(go env GOPATH)/bin/golangci-lint run

  python-ci:
    name: Python (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Distributed-Config
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config

      - name: Checkout Toolbox
        uses: actions/checkout@v4
        with:
          path: microservice-toolbox
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: microservice-toolbox/python/pyproject.toml
          
      - name: Install dependencies
        run: |
          cd microservice-toolbox/python
          pip install .[test]
          
      - name: Run Linting (Ruff)
        run: |
          cd microservice-toolbox/python
          ruff check .
          
      - name: Run Tests (Pytest)
        run: |
          cd microservice-toolbox/python
          pytest

  rust-ci:
    name: Rust (Test & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Distributed-Config
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config

      - name: Checkout Toolbox
        uses: actions/checkout@v4
        with:
          path: microservice-toolbox
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: microservice-toolbox/rust -> target

      - name: Run Cargo Test
        run: |
          cd microservice-toolbox/rust
          cargo test --verbose
          
      - name: Run Cargo Clippy
        run: |
          cd microservice-toolbox/rust
          cargo clippy -- -D warnings

  integration-ci:
    name: Cross-Language Integration
    needs: [go-ci, python-ci, rust-ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Distributed-Config
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config

      - name: Checkout Toolbox
        uses: actions/checkout@v4
        with:
          path: microservice-toolbox

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: microservice-toolbox/rust -> target
      - name: Install Python dependencies
        run: |
          cd microservice-toolbox/python
          pip install .
      - name: Run Integration Tests
        run: |
          cd microservice-toolbox
          chmod +x integration/run_tests.sh
          ./integration/run_tests.sh

