# [FLEET-ARCHITECT] Standardized Polyglot CI
name: Polyglot CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

env:
  GOTOOLCHAIN: auto

jobs:
  go-ci:
    name: Go Tests
    runs-on: ubuntu-latest
    # Only run if go.mod exists in root
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for go.mod
        id: check_go
        run: |
          if [ -f go.mod ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        if: steps.check_go.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go Tests
        if: steps.check_go.outputs.exists == 'false'
        run: |
          cd go
          go mod tidy
          go test -v ./...

      - name: Run golangci-lint
        if: steps.check_go.outputs.exists == 'true'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
  python-ci:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build CGO Bridges
        run: |
          if grep -q "^core:" Makefile; then make core; elif grep -q "^build:" Makefile; then make build; fi

      - name: Checkout Distributed Config (Dependency)
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config
          ref: develop

      - name: Build Distributed Config Library
        working-directory: distributed-config
        run: make build-lib

      - name: Test Python SDK
        working-directory: python
        env:
          LIBDISTCONF_PATH: ../distributed-config/distconf/libdistconf/libdistconf.so
        run: |
          pip install pytest build setuptools wheel pyyaml
          pip install -e .
          pytest
  rust-ci:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Checkout Distributed Config (Dependency)
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config
          ref: develop

      - name: Build Distributed Config Library
        working-directory: distributed-config
        run: make build-lib

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91

      - name: Test Rust SDK
        working-directory: rust
        env:
          LIBDISTCONF_PATH: ../distributed-config/distconf/libdistconf/libdistconf.so
        run: cargo test
  cpp-ci:
    name: C/C++ Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Checkout Distributed Config (Dependency)
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config
          ref: develop

      - name: Build Distributed Config Library
        working-directory: distributed-config
        run: make build-lib

      - name: Build and Test C/C++
        working-directory: cpp
        run: make test DISTCONF_DIR=../distributed-config/distconf/libdistconf
